[package]
name = "lavan"
version = "0.0.4-unstable"
authors = ["Sabi <sabitheotome@gmail.com>"]
description = "Lavan is a parser library"
license = "GPL-3.0"
repository = "https://github.com/sabitheotome/lavan"
edition = "2021"

[dependencies]
macros = { path = "./macros" }
either = { version = "1.9.0", optional = true }
derive_more = { version = "1.0.0", features = ["full"] }
derive-ctor = "1.0.6"

[dev-dependencies]

[features]
default = ["either"]
either = ["dep:either"]
repeat_api_v1 = []
experimental = []

[profile.dev]
opt-level = 2

[workspace]
members = ["macros"]
